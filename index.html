<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BOBBY Code LAB</title>

  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      padding: 20px;
    }

    .container {
      max-width: 800px;
      margin: auto;
    }

    .box {
      background: #222;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 10px;
    }

    textarea {
      width: 100%;
      height: 150px;
      background: #000;
      color: #0f0;
      border: none;
      padding: 10px;
    }

    button {
      padding: 10px;
      background: #00c3ff;
      border: none;
      cursor: pointer;
      margin-top: 10px;
    }

    pre {
      background: black;
      padding: 10px;
    }

    select {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="box">
    <h2>Problem</h2>

    <select id="problemSelect" onchange="loadProblem()">
      <option value="0">Print Hello World</option>
      <option value="1">Add two numbers</option>
      <option value="2">Check even or odd</option>
    </select>

    <p id="problemText"></p>
  </div>

  <div class="box">
    <h2>Your Code</h2>
    <textarea id="code">console.log("Hello World");</textarea>
    <button onclick="runCode()">Run Code</button>
  </div>

  <div class="box">
    <h2>Output</h2>
    <pre id="output"></pre>
  </div>

</div>

<script>
let problems = [
  "Print Hello World",
  "Add two numbers",
  "Check even or odd"
];

function loadProblem() {
  let index = document.getElementById("problemSelect").value;
  document.getElementById("problemText").innerText = problems[index];
}

function runCode() {
  let outputBox = document.getElementById("output");
  outputBox.innerHTML = "";

  let code = document.getElementById("code").value;

  try {
    let logs = [];
    let old = console.log;

    console.log = function(msg) {
      logs.push(msg);
    };

    eval(code);

    console.log = old;

    outputBox.innerHTML = logs.join("\n");
  } catch (err) {
    outputBox.innerHTML = "Error: " + err;
  }
}

loadProblem();
</script>

</body>
</html>
